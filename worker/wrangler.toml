name = "vantyx"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Per-tenant Custom Domains (Cloudflare auto-manages DNS + TLS on deploy). The apex + www serve the
# Vantyx splash; each tenant gets `<slug>.tryvantyx.space` — new tenants are added by the new-client CLI.
routes = [
  { pattern = "tryvantyx.space", custom_domain = true },
  { pattern = "www.tryvantyx.space", custom_domain = true },
  { pattern = "admin.tryvantyx.space", custom_domain = true },
  { pattern = "marina-one-ka.tryvantyx.space", custom_domain = true },
]

[vars]
# Product apex — tenants resolve from `<slug>.tryvantyx.space`; apex/www/reserved labels → Vantyx splash.
PRODUCT_APEX = "tryvantyx.space"
# Multi-tenant: no DEFAULT_TENANT fallback — an unresolved host shows the splash, not a tenant.
# Cloudflare Access for the operator console (admin.tryvantyx.space). AUD is an audience identifier +
# the team domain is public, so these are non-secret config (not secrets).
ACCESS_AUD = "f639c88e2fc907451e4bc2775794dcef28980311a535ffd1c8095c2b78f927c4"
ACCESS_TEAM_DOMAIN = "https://red-queen-4dfa.cloudflareaccess.com"

# Per-tenant config documents, keyed `config:<slug>`.
[[kv_namespaces]]
binding = "CONFIG"
id = "77fed171c931447d90d42261a52ec1c7"

# Private bucket of panorama + branding assets, prefixed by tenant slug.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "vantyx-tenants"

# Serve the built SPAs via Workers Static Assets (viewer at /, admin at /admin) from a combined
# dir assembled by `scripts/build-deploy.sh`. The Worker runs first (handles /api + /assets from
# KV/R2) and falls back to serving the SPA (env.ASSETS_SPA) for every other path.
[assets]
directory = ".assets"
binding = "ASSETS_SPA"
not_found_handling = "single-page-application"
run_worker_first = true

# Daily garbage collection: sweep orphaned image revs + prune old config history.
[triggers]
crons = ["0 3 * * *"]

# Workers observability (logs/metrics) — viewable in the dashboard + Logpush.
[observability]
enabled = true
