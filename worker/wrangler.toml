name = "vantyx"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[vars]
# Resolves tenants from subdomains once a real Vantyx domain is wired (multi-tenant).
PRODUCT_APEX = "pano.example.com"
# Single-tenant fallback for this workers.dev deploy (no per-tenant subdomain yet).
DEFAULT_TENANT = "marina-one-ka"

# Per-tenant config documents, keyed `config:<slug>`.
[[kv_namespaces]]
binding = "CONFIG"
id = "77fed171c931447d90d42261a52ec1c7"

# Private bucket of panorama + branding assets, prefixed by tenant slug.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "vantyx-tenants"

# Serve the built viewer SPA via Workers Static Assets. The Worker runs first (handles /api + /assets
# from KV/R2) and falls back to serving the SPA (env.ASSETS_SPA) for every other path.
[assets]
directory = "../apps/viewer/dist"
binding = "ASSETS_SPA"
not_found_handling = "single-page-application"
run_worker_first = true
