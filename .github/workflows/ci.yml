name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a newer push cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck (shared · worker · viewer · admin)
        run: bun run typecheck
      - name: Test
        run: bun test

  deploy:
    name: Build + deploy Worker
    needs: verify
    # Only on a push to main — never on PRs. Requires CLOUDFLARE_API_TOKEN (+ optional account id) secrets.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build SPAs + assemble Worker assets
        run: bash scripts/build-deploy.sh
      - name: Deploy Worker (Wrangler)
        working-directory: worker
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
